<!-- GPT SEARCH BAR -->
<div class="instrument-search-box">
  <input
    #searchInstrumentInput
    class="instrument-search-input"
    type="text"
    [formControl]="form"
    [matAutocomplete]="auto"
    placeholder="BTC/EUR o ASML"
    (focus)="onFocusSearch()"
    (click)="onFocusSearch()"
  />

  <button class="search-btn" type="button" aria-label="Buscar">
    <mat-icon>search</mat-icon>
  </button>

  <mat-autocomplete
    #auto="matAutocomplete"
    [displayWith]="displayInstrument"
    (optionSelected)="onInstrumentClicked($event)"
    panelWidth="720px"
  >
    <mat-option *ngFor="let instrument of filteredOptions | async" [value]="instrument">
      <div class="autocomplete-option">
        <div class="option-left">
          <div class="symbol">{{ instrument.symbol }}</div>
        </div>

        <div class="option-center">
          <div class="name">{{ instrument.name }}</div>
        </div>

        <div class="option-right">
          <div class="meta">{{ instrument.type }} · {{ instrument.exchange }}</div>
        </div>
      </div>
    </mat-option>
  </mat-autocomplete>
</div>
