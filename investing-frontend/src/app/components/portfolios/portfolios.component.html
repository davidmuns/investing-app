<img class="banner" src="assets/img/home-banner.png" alt="" />
<div class="page" (click)="closeEditIfOpen()">
  <div class="header">
    <div class="actions">
      <button mat-button aria-label="" [matMenuTriggerFor]="portfolio">
        <h2>
          Todas las carteras
          <!-- <span class="dropDownArrowBlackBig middle"></span> -->
          <mat-icon>arrow_drop_down</mat-icon>
        </h2>
      </button>
    </div>
    <div class="headerActions">
      <button mat-button *ngIf="portfolioType" (click)="reloadCurrentPortfolio()">
        <mat-icon matTooltip="Reload portfolio">refresh</mat-icon>
      </button>
    </div>
  </div>
  <p></p>
  <p *ngIf="loading">Cargando…</p>
  <p *ngIf="errorMsg" class="error">{{ errorMsg }}</p>
  <div class="portfolio-shell">
    <app-portfolio-tabs
      *ngIf="!loading"
      [portfolios]="portfolios"
      [selectedIndex]="selectedIndex"
      [editingIndex]="editingIndex"
      [editName]="editName"
      [watchlistType]="WATCHLIST"
      (addPortfolio)="onAddPortfolioClicked()"
      (dropTab)="dropTab($event)"
      (editNameChange)="editName = $event"
      (saveEdit)="saveEdit($event)"
      (cancelEdit)="cancelEdit()"
      (selectPortfolioTab)="selectPortfolioTab($event)"
      (startEdit)="startEdit($event)"
    ></app-portfolio-tabs>

    <!-- Position summary panel -->
    <app-position-summary-panel
      *ngIf="!isWatchlist"
      [positionsSummary]="positionsSummary"
      [transactionTab]="transactionTab"
      [closedPositionsSum]="closedPositionsSum"
    ></app-position-summary-panel>

    <!-- Search bar -->
    <div *ngIf="!loading && portfolios.length" class="panel">
      <div class="panelTop">
        <div class="addSymbol">
          <label class="addSymbolLabel">
            {{ this.portfolioType == WATCHLIST ? 'Añadir símbolo' : 'Añadir posición' }}
          </label>
          <app-search-instrument
            #searchInstrument
            (searchFocused)="onInstrumentSearchFocus()"
            (instrumentSelected)="onInstrumentSelected($event)"
          ></app-search-instrument>
        </div>
        <div>
          <ng-container *ngIf="!positionFormVisible; else close">
            <button
              mat-icon-button
              aria-label="Example icon button with a vertical three dot icon"
              [matMenuTriggerFor]="delete_portfolio"
            >
              <mat-icon matTooltip="Eliminar/descargar cartera">more_vert</mat-icon>
            </button>
          </ng-container>
          <ng-template #close>
            <mat-icon style="cursor: pointer" (click)="onCloseFormClicked()" matTooltip="Cerrar formulario">
              close
            </mat-icon>
          </ng-template>
        </div>
      </div>

      <p *ngIf="symbolError" class="error">{{ symbolError }}</p>

      <div class="panelHeader"></div>
    </div>

    <!-- Add Position form -->
    <app-add-position-form
      *ngIf="!isWatchlist && positionFormVisible"
      [positionFormEnabled]="positionFormEnabled"
      [selectedInstrument]="selectedInstrument"
      [closePrice]="closePrice"
      [portfolioId]="portfolioId"
      (addPosition)="onAddPosition($event)"
    ></app-add-position-form>

    <div *ngIf="!loading && !portfolios.length" class="hint">No hay carteras. Crea una con el botón “+”.</div>

    <!-- INSTRUMENTS TABLE -->
    <ng-container *ngIf="isWatchlist; else positionsTable">
      <mat-tab-group mat-align-tabs="start" animationDuration="0ms" [(selectedIndex)]="subTabIndex">
        <!-- RESUMEN TAB -->
        <mat-tab label="Resumen">
          <!-- WATCHLIST TABLE -->
          <app-instrument-table
            *ngIf="instruments.length"
            [instruments]="instruments"
            (instrumentDeleted)="onDeleteInstrument($event)"
          ></app-instrument-table>
        </mat-tab>
        <!-- GRAFICOS TAB -->
        <mat-tab label="Gráficos"></mat-tab>
      </mat-tab-group>
    </ng-container>
    <!-- POSITIONS TABLE -->
    <ng-template #positionsTable>
      <mat-tab-group
        mat-align-tabs="start"
        animationDuration="0ms"
        [(selectedIndex)]="subTabIndex"
        (selectedIndexChange)="selectPositionTab($event)"
      >
        <!-- POSITIONS TAB -->
        <mat-tab label="Posiciones">
          <!-- POSITIONS TABLE -->
          <app-position-table
            *ngIf="positions.length"
            [positionsSummary]="positionsSummary"
            [positions]="positions"
            (closePosition)="onClosePosition($event)"
            (updatePosition)="onUpdatePosition($event)"
          ></app-position-table>
        </mat-tab>
        <!-- TRANSACCIONS TAB -->
        <mat-tab label="Transacciones">
          <div class="transaction-selector">
            <button
              type="button"
              class="transaction-selector__item"
              [class.active]="transactionTab === 'open'"
              (click)="showOpenTransactions()"
            >
              Posiciones abiertas
            </button>
            <button
              type="button"
              class="transaction-selector__item"
              [class.active]="transactionTab === 'closed'"
              (click)="showClosedTransactions()"
            >
              Posiciones cerradas
            </button>
          </div>
          <!-- OPEN POSITIONS TABLE -->
          <app-position-open-table
            *ngIf="transactionTab === 'open' && positions.length"
            [positions]="positionsOpened"
            (closePosition)="onClosePosition($event)"
            (updatePosition)="onUpdatePosition($event)"
          ></app-position-open-table>
          <ng-container *ngIf="transactionTab === 'closed'">
            <!-- CLOSE POSITIONS PANEL-FILTER -->
            <app-position-close-panel
              [positions]="positionsClosed"
              (selectedSymbol)="onSymbolSelected($event)"
              [symbol]="symbol"
            ></app-position-close-panel>
            <!-- CLOSE POSITIONS TABLE -->
            <app-position-close-table
              *ngIf="positionsClosed.length"
              [positionsClosed]="positionsClosed"
              [portfolioId]="portfolioId"
              (deletePositionClose)="onDeletePositionClose($event)"
              [symbol]="symbol"
            ></app-position-close-table>
          </ng-container>
        </mat-tab>
      </mat-tab-group>
    </ng-template>
    <!-- TEXT IF NO TABLE -->
    <div
      *ngIf="!instruments.length && portfolioType === WATCHLIST"
      class="panel"
      style="text-align: center; font-size: 17px"
    >
      <p style="color: rgb(114, 118, 118)">
        Gestione su cartera aquí añadiendo acciones, bonos, materias primas, índices o monedas.
      </p>
    </div>
    <div
      *ngIf="!positions.length && portfolioType === POSITIONS && selectedPositionTab === 'Posiciones'"
      class="panel"
      style="text-align: center; font-size: 17px"
    >
      <p style="color: rgb(114, 118, 118)">
        No tiene ninguna posición abierta. Vaya a
        <span style="cursor: pointer; color: #1256a0; font-weight: bold" (click)="onInstrumentSearchFocus()">
          Añadir posición
        </span>
        para abrir una nueva posición.
      </p>
    </div>
  </div>
</div>

<!-- PORTFOLIO MENU -->
<mat-menu #portfolio>
  <ng-container *ngFor="let portfolio of portfolios; index as i">
    <button mat-menu-item (click)="selectPortfolioTab(i)">
      <mat-icon>
        {{ portfolio.type === WATCHLIST ? 'remove_red_eye' : 'business_center' }}
      </mat-icon>
      {{ portfolio.name }}
    </button>
    <mat-divider *ngIf="i < portfolios.length - 1"></mat-divider>
  </ng-container>
</mat-menu>

<!-- DELETE PORTFOLIO MENU -->
<mat-menu #delete_portfolio>
  <ng-container>
    <button mat-menu-item>
      <mat-icon>get_app</mat-icon>
      Descargar cartera
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="onDeletePortfolio()">
      <mat-icon>delete</mat-icon>
      Eliminar cartera
    </button>
  </ng-container>
</mat-menu>

<app-footer></app-footer>
