<div class="page" (click)="closeEditIfOpen()">
  <div class="header">
    <div class="actions">
      <button mat-button aria-label="" [matMenuTriggerFor]="portfolio">
        <h2>
          Todas las carteras
          <!-- <span class="dropDownArrowBlackBig middle"></span> -->
          <mat-icon>arrow_drop_down</mat-icon>
        </h2>
      </button>
    </div>
    <div class="headerActions">
      <button mat-button (click)="reloadInstruments()">
        <mat-icon matTooltip="Actualizar precios">refresh</mat-icon>
      </button>
    </div>
  </div>
  <p></p>
  <p *ngIf="loading">Cargando…</p>
  <p *ngIf="errorMsg" class="error">{{ errorMsg }}</p>
  <div *ngIf="!loading" class="tabBar">
    <!-- ✅ DropList en el contenedor de tabs -->
    <div class="tabs" cdkDropList cdkDropListOrientation="horizontal" (cdkDropListDropped)="dropTab($event)">
      <mat-tab-group
        mat-align-tabs="center"
        animationDuration="500ms"
        [selectedIndex]="selectedIndex"
        (selectedIndexChange)="selectTab($event)"
      >
        <mat-tab *ngFor="let p of portfolios | searchBar: this.symbolQuery; let i = index; trackBy: trackByPortfolio">
          <ng-template mat-tab-label>
            <!-- ✅ Drag SOLO en el label -->
            <div
              class="tabLabelContainer"
              [class.selected]="i === selectedIndex"
              cdkDrag
              cdkDragLockAxis="x"
              matTooltip="Arrstra para ordenar"
              [matTooltipDisabled]="i !== selectedIndex"
            >
              <ng-container *ngIf="editingIndex !== i; else editMode">
                <mat-icon class="dragHint" aria-hidden="true">drag_indicator</mat-icon>
                <mat-icon *ngIf="p.type.endsWith('T')">remove_red_eye</mat-icon>
                <mat-icon *ngIf="p.type.endsWith('S')">business_center</mat-icon>
                <span class="tabLabelText">
                  {{ p.name }}
                </span>

                <button
                  class="editButton"
                  mat-icon-button
                  type="button"
                  (click)="startEdit(i); $event.stopPropagation()"
                  aria-label="Renombrar"
                >
                  <mat-icon>edit</mat-icon>
                </button>
              </ng-container>

              <ng-template #editMode>
                <!-- ✅ mientras editas, mejor no arrastrar -->
                <input
                  #editInput
                  class="editInput"
                  [(ngModel)]="editName"
                  (keydown.enter)="saveEdit(i)"
                  (keydown.escape)="cancelEdit()"
                  (click)="$event.stopPropagation()"
                  (blur)="saveEdit(i)"
                  (mousedown)="$event.stopPropagation()"
                />
              </ng-template>
            </div>
          </ng-template>
        </mat-tab>
      </mat-tab-group>
    </div>
    <button mat-button color="primary" (click)="openCreatePortfolioDialog()">
      <mat-icon matTooltip="Crear nueva cartera">add</mat-icon>
    </button>
  </div>

  <!-- SEARCH BAR -->
  <div *ngIf="!loading && portfolios.length" class="panel">
    <div class="panelTop">
      <div class="addSymbol">
        <label class="addSymbolLabel">Añadir posición</label>
        <app-search-position-gpt
          [portfolioId]="portfolioId"
          (instrumentCreated)="reloadInstruments()"
        ></app-search-position-gpt>
        <!-- <app-search-position-oriol></app-search-position-oriol> -->
      </div>
      <div>
        <button
          mat-icon-button
          aria-label="Example icon button with a vertical three dot icon"
          [matMenuTriggerFor]="delete_portfolio"
        >
          <mat-icon matTooltip="Eliminar/descargar cartera">more_vert</mat-icon>
        </button>
      </div>
    </div>

    <p *ngIf="symbolError" class="error">{{ symbolError }}</p>

    <div class="panelHeader"></div>
  </div>

  <div *ngIf="!loading && !portfolios.length" class="hint">No hay carteras. Crea una con el botón “+”.</div>

  <div>
    <div>
      <mat-tab-group mat-align-tabs="start" animationDuration="500ms">
        <!-- RESUMEN TAB -->
        <mat-tab label="Resumen">
          <app-table
            *ngIf="instruments.length"
            [instruments]="instruments"
            (instrumentDeleted)="onDeleteInstrument($event)"
          ></app-table>
        </mat-tab>
        <!-- GRAFICOS TAB -->
        <mat-tab label="Gráficos"></mat-tab>
      </mat-tab-group>
    </div>
    <div *ngIf="!instruments.length" class="panel" style="text-align: center; font-size: 17px">
      <p style="color: rgb(114, 118, 118)">
        Gestione su cartera aquí añadiendo acciones, bonos, materias primas, índices o monedas.
      </p>
    </div>
  </div>
</div>

<!-- PORTFOLIO MENU -->
<mat-menu #portfolio>
  <ng-container *ngFor="let p of portfolios; index as i">
    <button mat-menu-item (click)="selectTab(i)">
      <mat-icon *ngIf="p.type.endsWith('T')">remove_red_eye</mat-icon>
      <mat-icon *ngIf="p.type.endsWith('S')">business_center</mat-icon>
      {{ p.name }}
    </button>
    <mat-divider *ngIf="i < portfolios.length - 1"></mat-divider>
  </ng-container>
</mat-menu>

<!-- DELETE PORTFOLIO -->
<mat-menu #delete_portfolio>
  <ng-container>
    <button mat-menu-item>
      <mat-icon>get_app</mat-icon>
      Descargar cartera
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="deleteSelected()">
      <mat-icon>delete</mat-icon>
      Eliminar cartera
    </button>
  </ng-container>
</mat-menu>
