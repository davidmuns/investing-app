<div class="page" (click)="closeEditIfOpen()">
  <div class="header">
    <div class="actions">
      <button mat-button aria-label="" [matMenuTriggerFor]="portfolio">
        <h2>
          Todas las carteras
          <!-- <span class="dropDownArrowBlackBig middle"></span> -->
          <mat-icon>arrow_drop_down</mat-icon>
        </h2>
      </button>
    </div>
    <div class="headerActions">
      <button mat-button (click)="reload()"><mat-icon>refresh</mat-icon></button>
    </div>
  </div>
  <p></p>
  <hr />
  <p *ngIf="loading">Cargando…</p>
  <p *ngIf="errorMsg" class="error">{{ errorMsg }}</p>
  <div *ngIf="!loading" class="tabBar">
    <!-- ✅ DropList en el contenedor de tabs -->
    <div class="tabs" cdkDropList cdkDropListOrientation="horizontal" (cdkDropListDropped)="dropTab($event)">
      <mat-tab-group
        mat-align-tabs="center"
        animationDuration="500ms"
        [selectedIndex]="selectedIndex"
        (selectedIndexChange)="selectTab($event)"
      >
        <mat-tab *ngFor="let p of portfolios | searchBar: this.symbolQuery; let i = index; trackBy: trackByPortfolio">
          <ng-template mat-tab-label>
            <!-- ✅ Drag SOLO en el label -->
            <div
              class="tabLabelContainer"
              [class.selected]="i === selectedIndex"
              cdkDrag
              cdkDragLockAxis="x"
              matTooltip="Arrstra para ordenar"
              [matTooltipDisabled]="i !== selectedIndex"
            >
              <ng-container *ngIf="editingIndex !== i; else editMode">
                <mat-icon class="dragHint" aria-hidden="true">drag_indicator</mat-icon>
                <span class="tabLabelText">
                  {{ p.name }}
                </span>

                <button
                  class="editButton"
                  mat-icon-button
                  type="button"
                  (click)="startEdit(i); $event.stopPropagation()"
                  aria-label="Renombrar"
                >
                  <mat-icon>edit</mat-icon>
                </button>
              </ng-container>

              <ng-template #editMode>
                <!-- ✅ mientras editas, mejor no arrastrar -->
                <input
                  #editInput
                  class="editInput"
                  [(ngModel)]="editName"
                  (keydown.enter)="saveEdit(i)"
                  (keydown.escape)="cancelEdit()"
                  (click)="$event.stopPropagation()"
                  (blur)="saveEdit(i)"
                  (mousedown)="$event.stopPropagation()"
                />
              </ng-template>
            </div>
          </ng-template>
        </mat-tab>
      </mat-tab-group>
    </div>
    <!-- <button class="tabPlus" type="button" (click)="openCreateModal()" title="Nueva cartera">+</button> -->
    <button mat-button (click)="openCreateModal()"><mat-icon>add</mat-icon></button>
  </div>

  <div *ngIf="!loading && portfolios.length" class="panel">
    <div class="panelTop">
      <div class="addSymbol">
        <label class="addSymbolLabel">Añadir posición</label>

        <form class="addSymbolForm" (submit)="submitSymbol(); $event.preventDefault()">
          <input
            class="addSymbolInput"
            type="text"
            placeholder="EUR/USD o BBVA"
            [(ngModel)]="symbolQuery"
            name="symbolQuery"
            autocomplete="off"
          />

          <!-- <button class="addSymbolBtn" type="submit" aria-label="Buscar">🔍</button> -->
          <button class="addSymbolBtn" type="submit" aria-label="Buscar">
            <mat-icon>search</mat-icon>
          </button>
        </form>
      </div>

      <!-- <div class="actions" (click)="$event.stopPropagation()">
        <button class="kebabBtn" type="button" (click)="toggleActions()" aria-label="Acciones">⋮</button>
        <div *ngIf="actionsOpen" class="menu">
          <button type="button" class="menuItem" (click)="closeActions()">⬇️ Descargar cartera</button>

          <div class="menuDivider"></div>

          <button type="button" class="menuItem danger" (click)="closeActions(); deleteSelected()">
            🗑️ Eliminar cartera
          </button>
        </div>
      </div> -->
      <div>
        <button
          mat-icon-button
          aria-label="Example icon button with a vertical three dot icon"
          [matMenuTriggerFor]="delete_portfolio"
        >
          <mat-icon>more_vert</mat-icon>
        </button>
      </div>
    </div>

    <p *ngIf="symbolError" class="error">{{ symbolError }}</p>

    <div class="panelHeader"></div>
  </div>

  <div *ngIf="!loading && !portfolios.length" class="hint">No hay carteras. Crea una con el botón “+”.</div>

  <!-- Modal -->
  <div *ngIf="modalOpen" class="modalBackdrop" (click)="closeCreateModal()">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modalHeader">
        <div class="modalTitle">Seleccione tipo de cartera</div>
        <button class="iconBtn" type="button" (click)="closeCreateModal()">×</button>
      </div>

      <div class="typePicker">
        <button type="button" class="typeBtn" [class.active]="form.type === 'WATCHLIST'" (click)="setType('WATCHLIST')">
          Lista de seguimiento
        </button>
        <button type="button" class="typeBtn" [class.active]="form.type === 'POSITIONS'" (click)="setType('POSITIONS')">
          Posiciones
        </button>
      </div>

      <label class="label">Nombre</label>
      <input
        class="input"
        type="text"
        placeholder="Introducir nombre de la cartera"
        [(ngModel)]="form.name"
        [disabled]="formLoading"
        (keydown.enter)="createPortfolio()"
      />

      <div *ngIf="formError" class="error formError">{{ formError }}</div>

      <div class="modalActions">
        <button type="button" (click)="closeCreateModal()" [disabled]="formLoading">Cancelar</button>
        <button type="button" (click)="createPortfolio()" [disabled]="formLoading || !form.name.trim()">
          {{ formLoading ? 'Creando…' : 'Crear' }}
        </button>
      </div>
    </div>
  </div>
</div>

<!-- PORTFOLIO MENU -->
<mat-menu #portfolio>
  <ng-container *ngFor="let p of portfolios; index as i">
    <button mat-menu-item (click)="selectTab(i)">
      <mat-icon>work</mat-icon>
      {{ p.name }}
    </button>
    <mat-divider *ngIf="i < portfolios.length - 1"></mat-divider>
  </ng-container>
</mat-menu>

<!-- DELETE PORTFOLIO -->
<mat-menu #delete_portfolio>
  <ng-container>
    <button mat-menu-item>
      <mat-icon>get_app</mat-icon>
      Descargar cartera
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="deleteSelected()">
      <mat-icon>delete</mat-icon>
      Eliminar cartera
    </button>
  </ng-container>
</mat-menu>
