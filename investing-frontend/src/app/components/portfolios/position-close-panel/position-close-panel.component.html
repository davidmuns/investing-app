<div class="panel">
  <div class="panelTop">
    <div class="addSymbol">
      <label class="middle">Símbolo:</label>
      <select>
        <option value="" data="ALLSYMBOLS">Todos los símbolos</option>
        <optgroup label="Símbolo"></optgroup>
        <option *ngFor="let p of positions">{{ p.symbol }}</option>
      </select>
    </div>
    <div>
      <span style="padding-right: 5px">B/P Neto:</span>
      <span *ngIf="sum == 0" style="color: black; font-weight: bold">{{ sum | number: '1.1-2' }}€</span>
      <span *ngIf="sum < 0" style="color: red; font-weight: bold">{{ sum | number: '1.1-2' }}€</span>
      <span *ngIf="sum > 0" style="color: green; font-weight: bold">{{ sum | number: '1.1-2' }}€</span>
    </div>
  </div>
</div>
