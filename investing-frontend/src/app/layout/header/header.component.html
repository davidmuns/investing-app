<mat-toolbar color="primary" class="toolbar">
  <span class="logo">Investing</span>

  <span class="spacer"></span>

  <button mat-icon-button [matMenuTriggerFor]="user">
    <mat-icon>account_circle</mat-icon>
  </button>

  <button mat-button routerLink="/portfolios">Portfolios</button>

  <button mat-icon-button>
    <mat-icon>notifications</mat-icon>
  </button>

  <!-- <button mat-icon-button [matMenuTriggerFor]="language">
        <mat-icon>language</mat-icon>
    </button> -->
</mat-toolbar>

<mat-menu #user="matMenu">
  <button mat-menu-item>
    <mat-icon>settings</mat-icon>
    <span>Settings</span>
  </button>
  <ng-container *ngIf="!tokenService.isLogged(); else loggedButton">
    <button mat-menu-item (click)="openLogin()">
      <mat-icon>login</mat-icon>
      <span>login</span>
    </button>
  </ng-container>
  <ng-template #loggedButton>
    <!-- <button class="logout" matTooltip="{{ tokenService.getUsername() }}" [matMenuTriggerFor]="user_menu"
          #menuTrigger="matMenuTrigger" (mouseover)="openMenu(menuTrigger)">
          {{ tokenService.getUsername()?.charAt(0)?.toUpperCase() }}
        </button> -->
    <button mat-menu-item (click)="onLogout()">
      <mat-icon>logout</mat-icon>
      <span>logout</span>
    </button>
  </ng-template>
</mat-menu>
